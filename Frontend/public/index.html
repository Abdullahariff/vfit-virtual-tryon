<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <meta
      name="description"
      content="Vfit Milano - The definitive digital fitting experience. Precision AI virtual try-on for the modern era."
    />
    <meta
      name="keywords"
      content="Vfit, virtual try-on, digital fashion, AR clothing, Milano style, AI fitting"
    />

    <meta name="theme-color" content="#0a0a0a" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Vfit" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <title>Vfit Milano | The Digital Atelier</title>

    <style>
      /* Global Reset for the Milano Aesthetic */
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f0; /* Milano Beige */
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        color: #0a0a0a;
      }

      /* Prevent text selection to feel more like a native app */
      #root {
        user-select: none;
        -webkit-user-select: none;
        min-height: 100vh;
      }

      /* Custom Scrollbar for Luxury Precision */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #f5f5f0;
      }
      ::-webkit-scrollbar-thumb {
        background: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
